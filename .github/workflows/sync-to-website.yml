name: Sync blog to keldon-website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-blog-to-website
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout keldon-blog
        uses: actions/checkout@v4
        with:
          path: blog-source

      - name: Checkout keldon-website
        uses: actions/checkout@v4
        with:
          repository: keldonio/keldon-website
          token: ${{ secrets.KELDON_WEBSITE_TOKEN }}
          path: website
          ref: main

      - name: Configure git
        run: |
          cd website
          git config user.name "keldon-content-sync"
          git config user.email "actions@users.noreply.github.com"

      - name: Sync blog content
        run: |
          rm -rf website/content/blog
          mkdir -p website/content/blog

          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'README.md' \
            --exclude 'CONTRIBUTING.md' \
            --exclude 'LICENSE' \
            blog-source/ website/content/blog/

      - name: Commit and push if changed
        run: |
          cd website
          git add -A content/blog/

          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi

          git commit -m "chore(sync): update blog from keldon-blog@${{ github.sha }}"
          git push origin main
